<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0c" />
  <title>Handheld Pro</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ── Strict device-skin DOM (EXACT — do not modify structure) ── -->
  <div id="emulator">
    <div id="device">
      <img id="device-skin" alt="" />

      <canvas id="screen"></canvas>
      <div id="hitbox-layer"></div>
    </div>
  </div>

  <!-- ── Utility bar: ghost controls, functional but visually invisible ── -->
  <div id="util-bar" aria-label="Emulator utilities">
    <label for="rom-upload" class="util-action" title="Load ROM">ROM</label>
    <input type="file" id="rom-upload"
           accept=".nes,.gb,.gbc,.gba,.sfc,.smc"
           hidden />

    <button id="prev-skin"      class="util-action" type="button" title="Previous skin">&#9664;</button>
    <button id="next-skin"      class="util-action" type="button" title="Next skin">&#9654;</button>
    <button id="fullscreen-btn" class="util-action" type="button" title="Fullscreen">&#x26F6;</button>
    <button id="save-state-btn" class="util-action" type="button" title="Save state">SAV</button>
    <button id="load-state-btn" class="util-action" type="button" title="Load state">LOD</button>

    <span id="status-text" class="util-status" aria-live="polite"></span>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
