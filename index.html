<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#231942" />
  <title>Retro Emulator Game</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div id="bootOverlay" class="boot-overlay" aria-live="polite">
    <div class="boot-logo">RETRO EMULATOR</div>
    <div class="boot-dots" aria-hidden="true">
      <span></span><span></span><span></span>
    </div>
    <p class="boot-text">Powering handheld system...</p>
  </div>

  <div class="app-shell">
    <header class="console-header">
      <h1>Retro Emulator Game</h1>
      <p class="subtitle">Offline-ready handheld console</p>
      <label class="sound-toggle"><input id="startupSoundToggle" type="checkbox" /> Startup sound</label>
    </header>

    <main class="console-body">
      <section class="screen-panel">
        <div class="status-row">
          <span id="activeSystem">System: None</span>
          <span id="activeCore">Core: None</span>
          <span id="activeRom">ROM: None</span>
          <button id="exitGameBtn" class="mini-exit-btn" type="button" hidden>Exit Game</button>
        </div>

        <div class="screen-frame">
          <canvas id="gameCanvas" width="640" height="480" aria-label="Emulator screen"></canvas>
          <div class="scanlines" aria-hidden="true"></div>
          <div class="screen-glow" aria-hidden="true"></div>
          <div id="cartridgeOverlay" class="cartridge-overlay" aria-hidden="true">
            <div class="cartridge-slot"></div>
            <div class="cartridge-body"></div>
            <p id="cartridgeLabel" class="cartridge-label">INSERTING CARTRIDGE...</p>
          </div>
          <button id="exitFullscreenOverlay" class="exit-overlay" type="button" hidden>Tap to exit game</button>
        </div>

        </div>

        <canvas id="gameCanvas" width="640" height="480" aria-label="Emulator screen"></canvas>
        <div class="game-actions">
          <button id="saveStateBtn" class="action-btn">Save State</button>
          <button id="loadStateBtn" class="action-btn">Load State</button>
          <button id="clearStateBtn" class="action-btn warning">Clear State</button>
        </div>
      </section>

      <aside class="library-panel">
        <h2>Game Library</h2>
        <label for="romInput" class="file-input-label">Upload ROM</label>
        <input id="romInput" type="file" accept=".nes,.smc,.sfc,.gb,.gbc,.gba" />
        <ol id="recentList" class="recent-list" aria-label="Recently played games"></ol>
        <input id="romInput" type="file" accept=".nes,.smc,.sfc,.gb,.gba" />
        <ul id="libraryList" class="library-list" aria-live="polite"></ul>
      </aside>
    </main>

    <section class="controls-section" aria-label="Touch controls">
      <div class="dpad">
        <button data-control="up" class="touch-btn dpad-up">▲</button>
        <button data-control="left" class="touch-btn dpad-left">◀</button>
        <button data-control="right" class="touch-btn dpad-right">▶</button>
        <button data-control="down" class="touch-btn dpad-down">▼</button>
      </div>
      <div class="action-cluster">
        <button data-control="a" class="touch-btn action a">A</button>
        <button data-control="b" class="touch-btn action b">B</button>
        <button data-control="x" class="touch-btn action x">X</button>
        <button data-control="y" class="touch-btn action y">Y</button>
        <button data-control="select" class="touch-btn utility">Select</button>
        <button data-control="start" class="touch-btn utility">Start</button>
      </div>
    </section>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
