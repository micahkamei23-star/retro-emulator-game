<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
  <title>Emulator UI</title>
  <link rel="stylesheet" href="styles.css"/>
</head>
<body>
  <div id="app-root">
    <div id="emulator-root">
      <div id="device-container">
        <img id="device-overlay" src="" alt="Device overlay"/>
        <canvas id="screen-main" class="emu-screen"></canvas>
        <canvas id="screen-secondary" class="emu-screen" style="display:none;"></canvas>
        <div id="controls-layer"></div>
      </div>
      <div id="settings-panel">
        <label>Skin
          <select id="skin-select"></select>
        </label>
        <label>Accent
          <input id="color-accent" type="color" value="#4CAF50"/>
        </label>
        <label>Opacity
          <input id="control-opacity" type="range" min="0" max="1" step="0.01" value="0.92"/>
        </label>
        <button id="btn-fullscreen">Fullscreen</button>
      </div>
    </div>
  </div>
  <script type="module" src="engine.js"></script>
</body>
</html>
