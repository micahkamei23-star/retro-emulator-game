<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 480">
  <defs>
    <linearGradient id="gba-body" x1="0" y1="0" x2="0.3" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#1a1c28"/>
      <stop offset="50%"  stop-color="#12141e"/>
      <stop offset="100%" stop-color="#0a0c14"/>
    </linearGradient>
    <linearGradient id="gba-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#2a2c3c"/>
      <stop offset="100%" stop-color="#1a1c28"/>
    </linearGradient>
    <linearGradient id="gba-btnA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6030c8"/>
      <stop offset="100%" stop-color="#4020a0"/>
    </linearGradient>
    <linearGradient id="gba-btnB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c04080"/>
      <stop offset="100%" stop-color="#902860"/>
    </linearGradient>
    <linearGradient id="gba-shoulder" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a3c4c"/>
      <stop offset="100%" stop-color="#22242e"/>
    </linearGradient>
    <filter id="gba-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="gba-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Device body ── -->
  <rect x="1" y="1" width="268" height="478" rx="20" ry="20"
        fill="url(#gba-body)" stroke="#2a2c3c" stroke-width="1.5"/>

  <!-- Side grip bumps (GBA-inspired) -->
  <rect x="0" y="200" width="8" height="80" rx="4" fill="#0f1018" stroke="#1a1c28" stroke-width="1"/>
  <rect x="262" y="200" width="8" height="80" rx="4" fill="#0f1018" stroke="#1a1c28" stroke-width="1"/>

  <!-- ── L Shoulder: center (21.6, 38.4) size=37.8 ── -->
  <!-- rect centered: x=2.7, y=19.5, w=37.8, h=37.8 -->
  <rect x="4" y="8" width="52" height="22" rx="6"
        fill="url(#gba-shoulder)" stroke="#1a1c28" stroke-width="1" filter="url(#gba-shadow)"/>
  <text x="30" y="23" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="10"
        fill="#8090c0" font-weight="bold">L</text>
  <rect x="4" y="27" width="52" height="8" rx="3" fill="#141620" opacity="0.6"/>

  <!-- ── R Shoulder: center (248.4, 38.4) size=37.8 ── -->
  <!-- rect centered: x=229.5, y=19.5, w=37.8, h=37.8 -->
  <rect x="214" y="8" width="52" height="22" rx="6"
        fill="url(#gba-shoulder)" stroke="#1a1c28" stroke-width="1" filter="url(#gba-shadow)"/>
  <text x="240" y="23" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="10"
        fill="#8090c0" font-weight="bold">R</text>
  <rect x="214" y="27" width="52" height="8" rx="3" fill="#141620" opacity="0.6"/>

  <!-- ── Screen panel ── -->
  <rect x="16" y="42" width="238" height="240" rx="8" ry="8"
        fill="url(#gba-panel)" stroke="#0e1018" stroke-width="1.5"/>

  <!-- Brand label -->
  <text x="135" y="72" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="9"
        fill="#404860" letter-spacing="3" font-weight="bold">RETRO ADVANCE</text>

  <!-- ── Screen cutout: left=0.10→27, top=0.20→96, w=0.80→216, h=0.40→192 ── -->
  <rect x="27" y="96" width="216" height="192" rx="3" ry="3" fill="#080c10"/>

  <!-- Screen surround glow -->
  <rect x="25" y="94" width="220" height="196" rx="4" ry="4"
        fill="none" stroke="#3040a0" stroke-width="1.5" opacity="0.4"/>
  <rect x="22" y="91" width="226" height="202" rx="5" ry="5"
        fill="none" stroke="#2030608" stroke-width="1" opacity="0.2"/>

  <!-- Screen shine -->
  <rect x="29" y="98" width="70" height="5" rx="2" fill="#2040a0" opacity="0.3"/>
  <rect x="29" y="98" width="5" height="70" rx="2" fill="#2040a0" opacity="0.3"/>

  <!-- Power LED -->
  <circle cx="246" cy="70" r="4.5" fill="#1050c0" filter="url(#gba-glow)" opacity="0.8"/>
  <circle cx="246" cy="70" r="3" fill="#4090ff"/>

  <!-- ── Lower section ── -->
  <rect x="16" y="290" width="238" height="4" rx="2" fill="#0e1018" opacity="0.8"/>

  <!-- ── D-pad: center (48.6, 345.6) size=54 ── -->
  <!-- Horizontal arm: x=21.6, y=336.6, w=54, h=18 -->
  <rect x="21.6" y="336.6" width="54" height="18" rx="3"
        fill="#1a1c28" stroke="#0e1018" stroke-width="1" filter="url(#gba-shadow)"/>
  <!-- Vertical arm: x=39.6, y=318.6, w=18, h=54 -->
  <rect x="39.6" y="318.6" width="18" height="54" rx="3"
        fill="#1a1c28" stroke="#0e1018" stroke-width="1" filter="url(#gba-shadow)"/>
  <!-- Center -->
  <rect x="39.6" y="336.6" width="18" height="18" rx="2" fill="#242634"/>
  <!-- Arrow indicators -->
  <polygon points="48.6,322.6 45,328.6 52.2,328.6" fill="#4050a0" opacity="0.7"/>
  <polygon points="48.6,368.6 45,362.6 52.2,362.6" fill="#4050a0" opacity="0.7"/>
  <polygon points="25.6,345.6 31.6,342 31.6,349.2" fill="#4050a0" opacity="0.7"/>
  <polygon points="71.6,345.6 65.6,342 65.6,349.2" fill="#4050a0" opacity="0.7"/>

  <!-- ── A button: center (221.4, 336) r≈16 ── -->
  <circle cx="221" cy="336" r="17" fill="#28107a" filter="url(#gba-shadow)"/>
  <circle cx="221" cy="336" r="15.5" fill="url(#gba-btnA)" stroke="#4020a8" stroke-width="0.5"/>
  <circle cx="216" cy="332" r="4.5" fill="#9070f0" opacity="0.35"/>
  <text x="221" y="341" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11"
        fill="#e0d0ff" font-weight="bold">A</text>

  <!-- ── B button: center (197.1, 374.4) r≈16 ── -->
  <circle cx="197" cy="374" r="17" fill="#601020" filter="url(#gba-shadow)"/>
  <circle cx="197" cy="374" r="15.5" fill="url(#gba-btnB)" stroke="#902040" stroke-width="0.5"/>
  <circle cx="192" cy="370" r="4.5" fill="#e070a0" opacity="0.35"/>
  <text x="197" y="379" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="11"
        fill="#ffe0f0" font-weight="bold">B</text>

  <!-- ── SELECT: center (121.5, 422.4) size=27 ── -->
  <!-- rect centered: x=108, y=416.9, w=27, h=11 -->
  <rect x="108" y="416.9" width="27" height="11" rx="5.5"
        fill="#1a1c28" stroke="#0e1018" stroke-width="1" filter="url(#gba-shadow)"/>
  <text x="121.5" y="425.4" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="5.5"
        fill="#505878" letter-spacing="0.3">SELECT</text>

  <!-- ── START: center (148.5, 422.4) size=27 ── -->
  <!-- rect centered: x=135, y=416.9, w=27, h=11 -->
  <rect x="135" y="416.9" width="27" height="11" rx="5.5"
        fill="#1a1c28" stroke="#0e1018" stroke-width="1" filter="url(#gba-shadow)"/>
  <text x="148.5" y="425.4" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="5.5"
        fill="#505878" letter-spacing="0.3">START</text>

  <!-- Speaker grilles (left and right of center) -->
  <line x1="88" y1="340" x2="88" y2="395" stroke="#303448" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="94" y1="338" x2="94" y2="397" stroke="#303448" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="100" y1="337" x2="100" y2="398" stroke="#303448" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="156" y1="337" x2="156" y2="398" stroke="#303448" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="162" y1="338" x2="162" y2="397" stroke="#303448" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="168" y1="340" x2="168" y2="395" stroke="#303448" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Model label -->
  <text x="135" y="472" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="5"
        fill="#2a3050" letter-spacing="1">MODEL GBA-SP2</text>
</svg>
