<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 270 480">
  <defs>
    <linearGradient id="psp-body" x1="0" y1="0" x2="0.2" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#2c2e3e"/>
      <stop offset="55%"  stop-color="#1c1e2e"/>
      <stop offset="100%" stop-color="#10121c"/>
    </linearGradient>
    <linearGradient id="psp-screen-panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#242636"/>
      <stop offset="100%" stop-color="#14162a"/>
    </linearGradient>
    <linearGradient id="psp-btnX" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4090e0"/>
      <stop offset="100%" stop-color="#2060b0"/>
    </linearGradient>
    <linearGradient id="psp-btnO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#e04040"/>
      <stop offset="100%" stop-color="#b02020"/>
    </linearGradient>
    <linearGradient id="psp-btnSq" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#c040c0"/>
      <stop offset="100%" stop-color="#902090"/>
    </linearGradient>
    <linearGradient id="psp-btnTr" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#40c080"/>
      <stop offset="100%" stop-color="#208050"/>
    </linearGradient>
    <filter id="psp-shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.7"/>
    </filter>
    <filter id="psp-glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ── Device body ── -->
  <rect x="1" y="1" width="268" height="478" rx="22" ry="22"
        fill="url(#psp-body)" stroke="#1c1e2e" stroke-width="1.5"/>

  <!-- Side grips -->
  <rect x="0" y="170" width="6" height="100" rx="3" fill="#10121a" stroke="#1c1e2e" stroke-width="1"/>
  <rect x="264" y="170" width="6" height="100" rx="3" fill="#10121a" stroke="#1c1e2e" stroke-width="1"/>

  <!-- Top buttons (power, hold) -->
  <rect x="90" y="2" width="30" height="6" rx="3" fill="#181a28" stroke="#0e1018" stroke-width="1"/>
  <text x="105" y="7" text-anchor="middle" font-family="monospace" font-size="4" fill="#303448">POWER</text>
  <rect x="150" y="2" width="30" height="6" rx="3" fill="#181a28" stroke="#0e1018" stroke-width="1"/>
  <text x="165" y="7" text-anchor="middle" font-family="monospace" font-size="4" fill="#303448">HOLD</text>

  <!-- ── Screen panel ── -->
  <rect x="14" y="30" width="242" height="282" rx="10" ry="10"
        fill="url(#psp-screen-panel)" stroke="#0e1018" stroke-width="1.5"/>

  <!-- Brand label -->
  <text x="135" y="56" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="8"
        fill="#3a3c5c" letter-spacing="3" font-weight="bold">PSR EMULATOR</text>

  <!-- ── Screen cutout: left=0.08→21.6, top=0.12→57.6, w=0.84→226.8, h=0.50→240 ── -->
  <rect x="21.6" y="57.6" width="226.8" height="240" rx="3" ry="3" fill="#06080e"/>

  <!-- Screen surround -->
  <rect x="19" y="55" width="232" height="245" rx="4" ry="4"
        fill="none" stroke="#2a2c4c" stroke-width="1.5" opacity="0.6"/>
  <!-- Subtle blue glow on screen edges -->
  <rect x="17" y="53" width="236" height="249" rx="5" ry="5"
        fill="none" stroke="#1820609" stroke-width="1" opacity="0.3"/>

  <!-- Screen corner shine -->
  <rect x="23" y="59" width="60" height="4" rx="2" fill="#2040a0" opacity="0.25"/>
  <rect x="23" y="59" width="4" height="60" rx="2" fill="#2040a0" opacity="0.25"/>

  <!-- Power LED (top right of screen) -->
  <circle cx="250" cy="50" r="4.5" fill="#0840a0" filter="url(#psp-glow)"/>
  <circle cx="250" cy="50" r="3" fill="#3080ff"/>

  <!-- ── Lower section ── -->
  <line x1="14" y1="316" x2="256" y2="316" stroke="#0e1018" stroke-width="2" opacity="0.8"/>

  <!-- ── D-pad: center (43.2, 360) size=54 ── -->
  <!-- Horizontal arm -->
  <rect x="16.2" y="351" width="54" height="18" rx="3"
        fill="#1c1e2e" stroke="#0e1018" stroke-width="1" filter="url(#psp-shadow)"/>
  <!-- Vertical arm -->
  <rect x="34.2" y="333" width="18" height="54" rx="3"
        fill="#1c1e2e" stroke="#0e1018" stroke-width="1" filter="url(#psp-shadow)"/>
  <!-- Center -->
  <rect x="34.2" y="351" width="18" height="18" rx="2" fill="#262838"/>
  <!-- Arrow indicators -->
  <polygon points="43.2,337 39.5,343 46.9,343" fill="#3a4070" opacity="0.8"/>
  <polygon points="43.2,383 39.5,377 46.9,377" fill="#3a4070" opacity="0.8"/>
  <polygon points="20.2,360 26.2,356.5 26.2,363.5" fill="#3a4070" opacity="0.8"/>
  <polygon points="66.2,360 60.2,356.5 60.2,363.5" fill="#3a4070" opacity="0.8"/>

  <!-- Analog nub (left) -->
  <circle cx="88" cy="336" r="12" fill="#141620" stroke="#0e1018" stroke-width="1.5" filter="url(#psp-shadow)"/>
  <circle cx="88" cy="336" r="9" fill="#1c1e2e"/>
  <circle cx="88" cy="336" r="5" fill="#242638"/>
  <text x="88" y="360" text-anchor="middle" font-family="monospace" font-size="5" fill="#2a2c4c">ANALOG</text>

  <!-- ── PlayStation-style ABXY (Cross/Circle/Square/Triangle) ── -->
  <!-- These map to: A=Cross/X, B=Circle/O for compatibility -->

  <!-- A button (Cross ✕): center (226.8, 360) r≈14 -->
  <circle cx="227" cy="360" r="15" fill="#0c2860" filter="url(#psp-shadow)"/>
  <circle cx="227" cy="360" r="13.5" fill="url(#psp-btnX)"/>
  <text x="227" y="365" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="12"
        fill="#d0e8ff" font-weight="bold">✕</text>

  <!-- B button (Circle ○): center (205.2, 393.6) r≈14 -->
  <circle cx="205" cy="394" r="15" fill="#600c14" filter="url(#psp-shadow)"/>
  <circle cx="205" cy="394" r="13.5" fill="url(#psp-btnO)"/>
  <text x="205" y="399" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="12"
        fill="#ffd0d0" font-weight="bold">○</text>

  <!-- Square (upper-left of face buttons) -->
  <circle cx="205" cy="326" r="13" fill="#300830" filter="url(#psp-shadow)"/>
  <circle cx="205" cy="326" r="11.5" fill="url(#psp-btnSq)"/>
  <text x="205" y="331" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="10"
        fill="#f0c0f0" font-weight="bold">□</text>

  <!-- Triangle (top of face buttons) -->
  <circle cx="227" cy="328" r="13" fill="#082818" filter="url(#psp-shadow)"/>
  <circle cx="227" cy="328" r="11.5" fill="url(#psp-btnTr)"/>
  <text x="227" y="333" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="10"
        fill="#b0f0d0" font-weight="bold">△</text>

  <!-- ── SELECT: center (113.4, 441.6) size=27 ── -->
  <rect x="99.9" y="436.1" width="27" height="11" rx="5.5"
        fill="#1c1e2e" stroke="#0e1018" stroke-width="1" filter="url(#psp-shadow)"/>
  <text x="113.4" y="444.5" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="5.5"
        fill="#404468" letter-spacing="0.3">SELECT</text>

  <!-- ── START: center (156.6, 441.6) size=27 ── -->
  <rect x="143.1" y="436.1" width="27" height="11" rx="5.5"
        fill="#1c1e2e" stroke="#0e1018" stroke-width="1" filter="url(#psp-shadow)"/>
  <text x="156.6" y="444.5" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="5.5"
        fill="#404468" letter-spacing="0.3">START</text>

  <!-- Home button -->
  <circle cx="135" cy="441" r="8" fill="#141620" stroke="#1c1e2e" stroke-width="1"/>
  <circle cx="135" cy="441" r="5" fill="#1c1e2e"/>
  <text x="135" y="444" text-anchor="middle" font-family="monospace" font-size="6" fill="#2a2c4c">⌂</text>

  <!-- Speaker grilles bottom -->
  <line x1="80" y1="455" x2="80" y2="472" stroke="#202230" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="87" y1="453" x2="87" y2="474" stroke="#202230" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="94" y1="452" x2="94" y2="475" stroke="#202230" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="176" y1="452" x2="176" y2="475" stroke="#202230" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="183" y1="453" x2="183" y2="474" stroke="#202230" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="190" y1="455" x2="190" y2="472" stroke="#202230" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Model label -->
  <text x="135" y="470" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="5"
        fill="#1e2030" letter-spacing="1">MODEL PSR-3000</text>
</svg>
